<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articley</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #ffffff;
            --surface: #f8fafc;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); z-index: 100;
        }

        .logo { font-weight: 800; font-size: 1.5rem; color: var(--primary); cursor: pointer; letter-spacing: -1px; }
        .nav-right { display: flex; gap: 1rem; align-items: center; }

        .btn {
            padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-weight: 600;
            cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }
        .btn-p { background: var(--primary); color: white; }
        .btn-p:hover { background: var(--primary-hover); }
        .btn-s { background: transparent; border: 1px solid var(--border); color: var(--text); }

        .hero { padding: 4rem 5%; text-align: center; background: var(--surface); border-bottom: 1px solid var(--border); }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; letter-spacing: -2px; }
        .search-wrap { max-width: 600px; margin: 2rem auto; position: relative; }
        #search {
            width: 100%; padding: 1rem 1.5rem; border-radius: 12px; border: 1px solid var(--border);
            font-size: 1.1rem; outline: none; box-shadow: var(--shadow);
        }

        .container { max-width: 1100px; margin: 2rem auto; padding: 0 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .card {
            padding: 1.5rem; border: 1px solid var(--border); border-radius: 12px;
            cursor: pointer; transition: 0.2s; background: white;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow); }
        .card h3 { margin-bottom: 0.5rem; }
        .card p { font-size: 0.9rem; color: var(--text-light); height: 4.5em; overflow: hidden; }

        .view { display: none; animation: slideUp 0.3s ease-out; }
        .active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #reader h1 { font-size: 3.5rem; margin-bottom: 0.5rem; letter-spacing: -2px; }
        .meta { padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; color: var(--text-light); }
        .content-body { font-size: 1.2rem; }
        .content-body h2 { margin-top: 2rem; }

        #editor input { width: 100%; padding: 1rem; font-size: 2.5rem; border: none; border-bottom: 2px solid var(--border); outline: none; font-weight: 800; margin-bottom: 2rem; }
        #editor textarea { width: 100%; height: 500px; padding: 1.5rem; border: 1px solid var(--border); border-radius: 12px; font-size: 1.1rem; outline: none; margin-bottom: 2rem; resize: none; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-c { background: white; padding: 2.5rem; border-radius: 16px; width: 90%; max-width: 400px; text-align: center; }
        .modal-c input { width: 100%; padding: 0.8rem; margin: 1rem 0; border: 1px solid var(--border); border-radius: 8px; }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: #e2e8f0; z-index: 2000; display: none; }
        #loader-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
    </style>
</head>
<body>

<div id="loader"><div id="loader-bar"></div></div>

<nav>
    <div class="logo" onclick="goHome()">Articley</div>
    <div class="nav-right">
        <span id="user-info" style="font-weight: 600; font-size: 0.9rem;"></span>
        <button class="btn btn-s" onclick="checkUser(() => showView('editor'))">Create</button>
        <button id="join-btn" class="btn btn-p" onclick="modal(true)">Join</button>
    </div>
</nav>

<div class="container">
    <section id="home" class="view active">
        <div class="hero">
            <h1>Knowledge for everyone.</h1>
            <div class="search-wrap">
                <input type="text" id="search" placeholder="Search articles..." oninput="doSearch(this.value)">
            </div>
        </div>
        <div id="list" class="grid" style="margin-top: 3rem;"></div>
    </section>

    <section id="reader" class="view">
        <div style="margin-bottom: 2rem; display: flex; gap: 1rem;">
            <button class="btn btn-s" onclick="goHome()">← Home</button>
            <button class="btn btn-p" id="edit-btn">Edit Page</button>
        </div>
        <h1 id="r-title"></h1>
        <div class="meta">By <span id="r-auth"></span> • <span id="r-date"></span></div>
        <div id="r-body" class="content-body"></div>
    </section>

    <section id="editor" class="view">
        <input type="text" id="e-title" placeholder="Title">
        <textarea id="e-body" placeholder="Content (Markdown supported)"></textarea>
        <div style="display: flex; gap: 1rem;">
            <button class="btn btn-p" onclick="save()">Publish</button>
            <button class="btn btn-s" onclick="goHome()">Cancel</button>
        </div>
    </section>
</div>

<div id="auth-modal" class="modal">
    <div class="modal-c">
        <h2>Welcome</h2>
        <p>Pick a username to contribute.</p>
        <input type="text" id="user-in" placeholder="Username">
        <button class="btn btn-p" style="width: 100%" onclick="auth()">Get Started</button>
    </div>
</div>

<script>
    const config = {
        p: '69deb2cf0036a29c0777', 
        d: '69deb30900045f483c2f', 
        c: 'articles'
    };

    const { Client, Account, Databases, Query, ID } = Appwrite;
    const cli = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject(config.p);
    const acc = new Account(cli);
    const db = new Databases(cli);

    let user = null;
    let editId = null;
    let sTimer = null;

    async function init() {
        try {
            user = await acc.get();
            document.getElementById('user-info').innerText = user.name;
            document.getElementById('join-btn').style.display = 'none';
        } catch (e) {}
        getArticles();
    }

    async function getArticles() {
        loading(true);
        try {
            const res = await db.listDocuments(config.d, config.c, [Query.orderDesc('$createdAt'), Query.limit(20)]);
            render(res.documents);
        } catch(e) { console.error(e); }
        loading(false);
    }

    async function doSearch(q) {
        clearTimeout(sTimer);
        sTimer = setTimeout(async () => {
            if(!q) return getArticles();
            const res = await db.listDocuments(config.d, config.c, [Query.search('title', q)]);
            render(res.documents);
        }, 300);
    }

    async function save() {
        const t = document.getElementById('e-title').value;
        const b = document.getElementById('e-body').value;
        if(!t || !b) return;

        loading(true);
        const data = { title: t, content: b, author_name: user.name };
        try {
            if(editId) await db.updateDocument(config.d, config.c, editId, data);
            else await db.createDocument(config.d, config.c, ID.unique(), data);
            goHome();
            getArticles();
        } catch (e) { alert(e.message); }
        loading(false);
    }

    async function open(id) {
        loading(true);
        try {
            const doc = await db.getDocument(config.d, config.c, id);
            document.getElementById('r-title').innerText = doc.title;
            document.getElementById('r-auth').innerText = doc.author_name;
            document.getElementById('r-date').innerText = new Date(doc.$updatedAt).toLocaleDateString();
            document.getElementById('r-body').innerHTML = marked.parse(doc.content);
            document.getElementById('edit-btn').onclick = () => {
                checkUser(() => {
                    editId = doc.$id;
                    document.getElementById('e-title').value = doc.title;
                    document.getElementById('e-body').value = doc.content;
                    showView('editor');
                });
            };
            showView('reader');
        } catch(e) { alert(e.message); }
        loading(false);
    }

    async function auth() {
        const n = document.getElementById('user-in').value;
        if(!n) return;
        try {
            await acc.createAnonymousSession();
            await acc.updateName(n);
            location.reload();
        } catch(e) { alert(e.message); }
    }

    function render(docs) {
        document.getElementById('list').innerHTML = docs.map(d => `
            <div class="card" onclick="open('${d.$id}')">
                <h3>${d.title}</h3>
                <p>${d.content.substring(0, 150)}...</p>
                <div style="margin-top:1rem; font-size:0.8rem; color:#64748b">By ${d.author_name}</div>
            </div>
        `).join('');
    }

    function showView(v) {
        document.querySelectorAll('.view').forEach(s => s.classList.remove('active'));
        document.getElementById(v).classList.add('active');
        if(v !== 'editor') editId = null;
        window.scrollTo(0,0);
    }

    function goHome() { 
        document.getElementById('e-title').value = '';
        document.getElementById('e-body').value = '';
        showView('home'); 
    }
    
    function modal(s) { document.getElementById('auth-modal').style.display = s ? 'flex' : 'none'; }
    
    function loading(s) {
        const b = document.getElementById('loader-bar');
        document.getElementById('loader').style.display = s ? 'block' : 'none';
        b.style.width = s ? '60%' : '100%';
    }

    function checkUser(cb) { if(!user) modal(true); else cb(); }

    init();
</script>
</body>
</html>
